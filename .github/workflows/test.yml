name: Unit Tests

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Test
      run: go test -v ./...

    - name: Coverage
      run: |
        go test -coverprofile=coverage.out ./...
        
    - name: Upload Coverage Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.out
